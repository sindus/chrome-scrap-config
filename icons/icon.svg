  <!-- Crosshair lines -->
  <line x1="64" y1="16" x2="64" y2="40" stroke="#e53935" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="88" x2="64" y2="112" stroke="#e53935" stroke-width="4" stroke-linecap="round"/>
  <line x1="16" y1="64" x2="40" y2="64" stroke="#e53935" stroke-width="4" stroke-linecap="round"/>
  <line x1="88" y1="64" x2="112" y2="64" stroke="#e53935" stroke-width="4" stroke-linecap="round"/>
</svg>
