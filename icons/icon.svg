<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#1a1a2e"/>

  <!-- Crosshair outer ring -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="#e53935" stroke-width="5"/>

  <!-- Crosshair inner ring -->
